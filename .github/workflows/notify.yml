# ═══════════════════════════════════════════════════════════
#  notify.yml — Telegram Broadcast Notifications
#  المسار في المشروع: .github/workflows/notify.yml
# ═══════════════════════════════════════════════════════════

name: Telegram Notifications

on:
  schedule:
    - cron: '* * * * *'   # كل دقيقة — لم يتغير
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Run Notifier (Broadcast)
        env:
          FIREBASE_DB_URL: https://crash-13b94-default-rtdb.firebaseio.com
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 🆕 كلمة سر البوت — أضفها في GitHub Secrets
          BOT_PASSWORD:    ${{ secrets.BOT_PASSWORD }}
        run: node .github/scripts/notifier.js

      - name: Save sent IDs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/scripts/sent_ids.json || true
          git diff --staged --quiet || git commit -m "update sent_ids"
          git push || true
